<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Webアプリ一覧 | 合同会社シティーリバー</title>
  <meta name="description" content="合同会社シティーリバーが開発・提供するWebアプリケーションの一覧ページです。" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="icon" href="favicon.ico" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f8f9fa;
      --text-primary: #0a0a0a;
      --text-secondary: #6b7280;
      --accent: #0ea5e9;
      --accent-light: #ecfeff;
      --border: rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.7;
      min-height: 100vh;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border);
    }

    .nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo-text {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      text-decoration: none;
    }

    .logo-img {
      height: 40px;
      width: auto;
      object-fit: contain;
    }

    .nav-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      transition: color 0.3s ease;
    }

    .nav-link:hover { color: var(--accent); }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 80px 40px 120px;
    }

    .breadcrumb {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 32px;
    }

    .breadcrumb a {
      color: var(--accent);
      text-decoration: none;
    }

    .page-header {
      margin-bottom: 64px;
      text-align: center;
    }

    .page-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent-light);
      color: var(--accent);
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .page-title {
      font-size: clamp(2.5rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    .page-subtitle {
      font-size: 18px;
      color: var(--text-secondary);
      line-height: 1.8;
      max-width: 700px;
      margin: 0 auto;
    }

    .product-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }

    .product-item {
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 28px;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .product-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(14, 165, 233, 0.1);
      border-color: var(--accent);
    }

    .product-item-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .product-item h3 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .product-item-tag {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 100px;
      background: var(--accent-light);
      color: var(--accent);
      white-space: nowrap;
    }

    .product-item p {
      color: var(--text-secondary);
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 20px;
      flex: 1;
    }

    .product-item-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 4px 12px rgba(14, 165, 233, 0.2);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(14, 165, 233, 0.3);
    }

    .btn-outline {
      background: white;
      color: var(--text-primary);
      border: 1.5px solid var(--border);
    }

    .btn-outline:hover {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: var(--text-secondary);
    }

    .empty-state-icon {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: var(--accent-light);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .empty-state h3 {
      font-size: 20px;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    footer {
      padding: 40px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 768px) {
      .nav { padding: 16px 24px; }
      main { padding: 60px 24px 80px; }
      .page-title { font-size: 2rem; }
      .product-list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <nav class="nav">
      <a href="index.html" class="logo-text">
        <img src="Logo.png" alt="CityRiver LLC" class="logo-img">
        合同会社シティーリバー
      </a>
      <a href="index.html#contact" class="nav-link">Contact</a>
    </nav>
  </header>

  <main>
    <div class="breadcrumb">
      <a href="index.html">ホーム</a> / <a href="index.html#products">プロダクト</a> / Webアプリ
    </div>

    <div class="page-header">
      <div class="page-badge">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        Web Applications
      </div>
      <h1 class="page-title">Webアプリ一覧</h1>
      <p class="page-subtitle">ブラウザで動作するWebアプリケーション。インストール不要ですぐに利用可能。</p>
    </div>

    <div class="product-list">
      <div class="empty-state">
        <div class="empty-state-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        </div>
        <h3>準備中</h3>
        <p>Webアプリは現在開発中です。公開までお待ちください。</p>
      </div>
    </div>
  </main>

  <footer>
    &copy; <span id="year"></span> 合同会社シティーリバー / CityRiver LLC. All rights reserved.
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
